<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভিডিও গ্যালারি</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #e8e8f0;
    --muted: #555568;
    --card-bg: #13131d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 1rem; }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .logo h1 {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.4rem;
    color: var(--accent);
  }

  .header-meta { font-size: 0.7rem; color: var(--muted); text-align: right; }

  .hero {
    padding: 4rem 3rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero::after {
    content: '▶';
    position: absolute;
    right: 3rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8rem;
    color: var(--border);
    line-height: 1;
  }

  .hero-tag {
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .hero h2 {
    font-family: 'Tiro Bangla', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    max-width: 600px;
  }

  .hero h2 span { color: var(--accent); }

  main { padding: 3rem; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  .count span { color: var(--accent); font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .card:hover .thumb-overlay { opacity: 1; }

  .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #0d0d18;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .thumb-icon {
    width: 52px;
    height: 52px;
    background: rgba(232,255,71,0.12);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }

  .card:hover .thumb-icon { background: rgba(232,255,71,0.25); transform: scale(1.1); }

  .thumb-icon::after {
    content: '';
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 9px 0 9px 16px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 3px;
  }

  .thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,255,71,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Views badge on thumbnail */
  .views-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.58rem;
    padding: 0.2rem 0.45rem;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    backdrop-filter: blur(4px);
  }

  .views-badge::before {
    content: '👁';
    font-size: 0.65rem;
  }

  .card-body {
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--border);
  }

  .card-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.4rem;
  }

  .card-num { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.15em; }

  .card-views-inline {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .card-views-inline .eye { color: var(--accent); }

  .card-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(8px);
  }

  .modal.open { display: flex; animation: modalIn 0.25s ease; }

  @keyframes modalIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-inner {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    animation: scaleIn 0.25s ease;
  }

  @keyframes scaleIn {
    from { transform: scale(0.95); }
    to { transform: scale(1); }
  }

  .modal-close {
    position: absolute;
    top: -1.5rem;
    right: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--accent2); }

  .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
  .video-wrap video { width: 100%; height: 100%; display: block; }

  .modal-footer {
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title { font-family: 'Tiro Bangla', serif; font-size: 1rem; }

  .modal-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .modal-views {
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .modal-ext { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }

  .empty {
    grid-column: 1/-1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--muted);
  }

  .empty p { font-size: 0.8rem; line-height: 2; }

  .loading {
    grid-column: 1/-1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    animation: blink 1s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4rem;
  }

  footer a { color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.1em; }
  footer .rights { font-size: 0.65rem; color: var(--muted); }

  @media (max-width: 640px) {
    header, main, footer, .hero { padding: 1.2rem; }
    .grid { grid-template-columns: 1fr; }
    .hero::after { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>ভিডিও গ্যালারি</h1>
  </div>
  <div class="header-meta">
    <div id="headerCount">লোড হচ্ছে...</div>
    <div>GitHub Pages</div>
  </div>
</header>

<section class="hero">
  <div class="hero-tag">// video collection</div>
  <h2>সব ভিডিও <span>এক জায়গায়</span></h2>
</section>

<main>
  <div class="toolbar">
    <div class="count">মোট <span id="totalCount">—</span> টি ভিডিও</div>
  </div>
  <div class="grid" id="grid">
    <div class="loading">LOADING VIDEOS...</div>
  </div>
</main>

<footer>
  <a href="admin.html">⚙ অ্যাডমিন প্যানেল</a>
  <span class="rights">ভিডিও গ্যালারি</span>
</footer>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">[ ESC ] বন্ধ করুন</button>
    <div class="video-wrap">
      <video id="modalVideo" controls autoplay></video>
    </div>
    <div class="modal-footer">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-right">
        <div class="modal-views" id="modalViews">👁 0 views</div>
        <div class="modal-ext">HD VIDEO</div>
      </div>
    </div>
  </div>
</div>

<script>
  const VIDEOS_FILE = 'videos.txt';
  const VIEWS_KEY = 'vg_views';

  // --- Views storage (localStorage) ---
  function getAllViews() {
    try { return JSON.parse(localStorage.getItem(VIEWS_KEY) || '{}'); } catch { return {}; }
  }

  function getViews(url) {
    return getAllViews()[url] || 0;
  }

  function incrementViews(url) {
    const all = getAllViews();
    all[url] = (all[url] || 0) + 1;
    localStorage.setItem(VIEWS_KEY, JSON.stringify(all));
    return all[url];
  }

  function formatViews(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
  }

  // --- Load videos ---
  async function loadVideos() {
    try {
      const res = await fetch(VIDEOS_FILE + '?t=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      return parseVideos(text);
    } catch { return []; }
  }

  function parseVideos(text) {
    return text.split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'))
      .map(l => {
        const [url, ...titleParts] = l.split('|');
        return {
          url: url.trim(),
          title: titleParts.join('|').trim() || extractName(url.trim())
        };
      });
  }

  function extractName(url) {
    try {
      const parts = url.split('/');
      return decodeURIComponent(parts[parts.length - 1]).replace(/\.[^.]+$/, '');
    } catch { return url; }
  }

  function renderGrid(videos) {
    const grid = document.getElementById('grid');
    document.getElementById('totalCount').textContent = videos.length;
    document.getElementById('headerCount').textContent = videos.length + ' ভিডিও';

    if (!videos.length) {
      grid.innerHTML = `<div class="empty"><p>কোনো ভিডিও নেই।<br>অ্যাডমিন প্যানেল থেকে ভিডিও যোগ করুন।</p></div>`;
      return;
    }

    grid.innerHTML = '';
    videos.forEach((v, i) => {
      const views = getViews(v.url);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="thumb">
          <div class="thumb-overlay"></div>
          <div class="thumb-icon"></div>
          <div class="views-badge" id="badge-${i}">${formatViews(views)} views</div>
        </div>
        <div class="card-body">
          <div class="card-top-row">
            <div class="card-num">#${String(i+1).padStart(3,'0')}</div>
            <div class="card-views-inline"><span class="eye">👁</span> <span id="views-${i}">${formatViews(views)}</span></div>
          </div>
          <div class="card-title">${v.title}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        const newCount = incrementViews(v.url);
        document.getElementById('views-' + i).textContent = formatViews(newCount);
        document.getElementById('badge-' + i).textContent = formatViews(newCount) + ' views';
        openModal(v, newCount);
      });
      grid.appendChild(card);
    });
  }

  function openModal(v, views) {
    const modal = document.getElementById('modal');
    document.getElementById('modalVideo').src = v.url;
    document.getElementById('modalTitle').textContent = v.title;
    document.getElementById('modalViews').textContent = '👁 ' + formatViews(views) + ' views';
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const modal = document.getElementById('modal');
    const vid = document.getElementById('modalVideo');
    vid.pause();
    vid.src = '';
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadVideos().then(renderGrid);
</script>
</body>
</html>
